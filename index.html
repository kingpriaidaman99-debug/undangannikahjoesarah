<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Joe & Sarah</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Poppins', sans-serif;
  background:#0d0d0d;
  color:white;
  text-align:center;
  overflow-x:hidden;
}

/* COVER */
#cover {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)),
  url('https://images.unsplash.com/photo-1519741497674-611481863552') center/cover;
}

h1 {
  font-family:'Great Vibes', cursive;
  font-size:55px;
  margin:10px 0;
}

button {
  padding:12px 28px;
  border:none;
  background:gold;
  color:black;
  font-weight:bold;
  border-radius:30px;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  transform:scale(1.1);
}

/* CONTENT */
#content {
  display:none;
  padding:30px 20px;
}

.section {
  margin:50px 0;
}

.card {
  background:#1a1a1a;
  padding:25px;
  border-radius:20px;
  box-shadow:0 0 15px rgba(255,215,0,0.2);
}

/* ANIMATION */
.fade {
  animation:fadeIn 1.5s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

/* COUNTDOWN */
#countdown {
  font-size:22px;
  margin-top:10px;
  color:gold;
}
</style>

</head>

<body>

<!-- COVER -->
<div id="cover">
  <h1>Joe & Sarah</h1>
  <p>Wedding Invitation</p>
  <button onclick="bukaUndangan()">Buka Undangan</button>
</div>

<!-- CONTENT -->
<div id="content" class="fade">

  <div class="section">
    <h1>Joe & Sarah</h1>
    <p>Dengan penuh cinta kami mengundang Anda</p>
  </div>

  <div class="section card">
    <h2>📅 Tanggal</h2>
    <p>Sabtu, 20 Desember 2026</p>
  </div>

  <div class="section card">
    <h2>⏰ Waktu</h2>
    <p>10:00 WIB - Selesai</p>
  </div>

  <div class="section card">
    <h2>📍 Lokasi</h2>
    <p>Hotel Bahagia, Jakarta</p>
  </div>

  <div class="section card">
    <h2>⏳ Countdown</h2>
    <div id="countdown"></div>
  </div>

  <div class="section">
    <h2>💖 Doa & Restu</h2>
    <p>Merupakan suatu kehormatan bagi kami apabila Anda berkenan hadir.</p>
  </div>

</div>

<script>
function bukaUndangan() {
  document.getElementById("cover").style.display = "none";
  document.getElementById("content").style.display = "block";
}

/* COUNTDOWN */
var targetDate = new Date("Dec 20, 2026 10:00:00").getTime();

var x = setInterval(function() {
  var now = new Date().getTime();
  var distance = targetDate - now;

  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
  var minutes = Math.floor((distance / 1000 / 60) % 60);

  document.getElementById("countdown").innerHTML =
    days + " Hari " + hours + " Jam " + minutes + " Menit";

}, 1000);
</script>

</body>
</html>
