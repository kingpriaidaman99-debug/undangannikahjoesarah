<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Poppins', sans-serif;
  background:#111;
  color:white;
  text-align:center;
}

/* COVER */
#cover {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background: url('https://images.unsplash.com/photo-1529636798458-92182e662485') center/cover;
}

h1 {
  font-family:'Great Vibes', cursive;
  font-size:50px;
}

button {
  padding:12px 25px;
  border:none;
  background:#d4af37;
  color:black;
  font-weight:bold;
  border-radius:30px;
  cursor:pointer;
}

/* CONTENT */
#content {
  display:none;
  padding:30px;
}

.section {
  margin:40px 0;
}

.card {
  background:#1c1c1c;
  padding:20px;
  border-radius:15px;
}

/* ANIMATION */
.fade {
  animation:fadeIn 1.5s ease;
}

@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}
</style>

</head>

<body>

<!-- COVER -->
<div id="cover">
  <h1>Aldi & Melli</h1>
  <p>Kepada Yth. Tamu Undangan</p>
  <button onclick="bukaUndangan()">Buka Undangan</button>
</div>

<!-- CONTENT -->
<div id="content" class="fade">

  <div class="section">
    <h1>Aldi & Melli</h1>
    <p>Akan melangsungkan pernikahan</p>
  </div>

  <div class="section card">
    <h2>📅 Tanggal</h2>
    <p>Minggu, 20 Desember 2026</p>
  </div>

  <div class="section card">
    <h2>📍 Lokasi</h2>
    <p>Hotel Bahagia, Jakarta</p>
  </div>

  <div class="section card">
    <h2>⏰ Waktu</h2>
    <p>10:00 WIB - Selesai</p>
  </div>

  <div class="section">
    <h2>💖 Doa & Ucapan</h2>
    <p>Merupakan suatu kehormatan bagi kami apabila Anda berkenan hadir.</p>
  </div>

</div>

<script>
function bukaUndangan() {
  document.getElementById("cover").style.display = "none";
  document.getElementById("content").style.display = "block";
}
</script>

</body>
</html>
